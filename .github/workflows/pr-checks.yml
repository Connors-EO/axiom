name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: axiom_dev
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install poetry && poetry install
      - name: Create axiom role
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 5433 -U postgres -d axiom_dev \
            -c "CREATE ROLE axiom WITH LOGIN PASSWORD 'axiom';"
          psql -h localhost -p 5433 -U postgres -d axiom_dev \
            -c "GRANT ALL PRIVILEGES ON DATABASE axiom_dev TO axiom;"
          psql -h localhost -p 5433 -U postgres -d axiom_dev \
            -c "GRANT ALL ON SCHEMA public TO axiom;"
      - name: Run migrate
        env:
          PGHOST: localhost
          PGPORT: 5433
          PGDATABASE: axiom_dev
          PGUSER: axiom
          PGPASSWORD: axiom
        run: poetry run python -m backend.db.migrate
      - name: Run seed
        env:
          PGHOST: localhost
          PGPORT: 5433
          PGDATABASE: axiom_dev
          PGUSER: axiom
          PGPASSWORD: axiom
        run: poetry run python -m backend.db.seed
      - name: Run tests
        env:
          PGHOST: localhost
          PGPORT: 5433
          PGDATABASE: axiom_dev
          PGUSER: axiom
          PGPASSWORD: axiom
        run: poetry run pytest

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install poetry && poetry install
      - name: Run mypy
        run: poetry run mypy backend/src

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install poetry && poetry install
      - name: Run ruff
        run: poetry run ruff check backend/

  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install commitlint
        run: |
          npm install --save-dev \
            @commitlint/cli \
            @commitlint/config-conventional
      - name: Create commitlint config
        run: |
          cat > commitlint.config.js << 'EOF'
          module.exports = {
            extends: ['@commitlint/config-conventional'],
            rules: {
              'type-enum': [2, 'always', [
                'feat','fix','docs','knowledge',
                'infra','chore','refactor'
              ]]
            }
          }
          EOF
      - name: Run commitlint
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
      - name: Validate staging
        run: |
          cd infra/staging
          terraform init -backend=false
          terraform validate
