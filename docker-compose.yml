services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: axiom_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/docker/init.sql:/docker-entrypoint-initdb.d/01_axiom_user.sql

volumes:
  postgres_data:
